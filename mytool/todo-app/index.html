<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
    <title>Document</title>
  </head>

  <body>
    <main>
      <header>
        <h1>Simple Todo App</h1>
      </header>

      <section id="todoSection">
        <form action="" id="todoForm">
          <input
            type="text"
            placeholder=":D input your todo :D"
            id="todoText"
          />

          <div id="todoElapsedTime">
            <input
              type="number"
              placeholder="hh"
              id="hour"
              min="0"
              max="23"
              value="0"
            />
            <input
              type="number"
              placeholder="mm"
              id="minute"
              min="0"
              max="59"
              value="0"
            />
            <input
              type="number"
              placeholder="dd"
              id="second"
              min="0"
              max="59"
              value="0"
            />
          </div>
          <button id="todoInput">+</button>
        </form>

        <section id="todoList">
          <ul>
            <li>English 1:12:00</li>
            <li>Programming 0:43:11</li>
          </ul>
        </section>
      </section>
    </main>
  </body>
</html>
