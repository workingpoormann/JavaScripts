<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css" />
    <title>Temperature Converter</title>
  </head>

  <body>
    <main>
      <header>
        <h1>Temperature Converter</h1>
      </header>

      <section>
        <div class="item">Celsius: <input type="number" id="celsius" /></div>
        <div class="item">
          Fahrenheit: <input type="number" id="fahrenheit" />
        </div>
        <div class="item">Kelvin: <input type="number" id="kelvin" /></div>
      </section>
    </main>
  </body>
</html>
