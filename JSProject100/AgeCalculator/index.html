<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Age Calculator</title>

    <script src="script.js" defer></script>
    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <header>Age Calculator</header>

      <label for="start">Enter your date birth:</label>
      <input type="date" id="birthdayInput" name="your birthday" />
      <button id="ageButton">Calculate Age</button>
      <p id="showAge">Your age is <span id="age"></span> years old</p>
    </div>
  </body>
</html>
